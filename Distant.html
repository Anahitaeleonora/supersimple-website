<!DOCTYPE html>
<html lang="no">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Distant – Anahita Eleonora</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    .art-page {
      display: flex;
      gap: 2.5rem;
      align-items: flex-start;
      margin-top: 2rem;
    }

    .art-images {
      width: 55%;
    }

    .art-images img {
      width: 100%;
      height: auto;
      border: 1px solid #ccc;
    }

    .art-info {
      width: 45%;
    }

    .art-title {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .art-info p {
      margin: 0.5rem 0;
      line-height: 1.6;
    }

    .purchase-btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.8rem 1.6rem;
      background-color: #ffffff;
      color: #000000;
      border: 1px solid #000000;
      text-decoration: none;
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .purchase-btn:hover {
      background-color: #000000;
      color: #ffffff;
    }

    @media (max-width: 768px) {
      .art-page {
        flex-direction: column;
      }

      .art-images,
      .art-info {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <main>

    <section class="hero">

      <div class="header-box">

        <h2>
          <a href="index.html" style="text-decoration:none; color:inherit;">
            ANAHITA ELEONORA
          </a>
        </h2>

        <nav class="top-nav">
          <a href="index.html">HOME</a>
          <a href="gallery.html">GALLERY</a>
          <a href="om.html">ABOUT</a>
          <a href="index.html#kontakt">CONTACT</a>
        </nav>

      </div>

      <div class="art-page">

        <!-- IMAGE -->
        <div class="art-images">
          <img src="distant.jpg" alt="Distant">
        </div>

        <!-- INFO -->
        <div class="art-info">

          <div class="art-title">Distant</div>

          <p><strong>Size:</strong> 90 × 50 cm</p>
          <p><strong>Price:</strong> Price on request</p>
          <p><strong>Technique:</strong> Acrylic on canvas</p>
          <p><strong>Description:</strong> Reserved.</p>

          <a href="Purchase.html" class="purchase-btn">PURCHASE</a>

        </div>

      </div>

    </section>

  </main>

  <footer>
    &copy; 2025 Anahita Eleonora
  </footer>

</body>
</html>
