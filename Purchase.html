<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inquiry – Anahita Eleonora</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    main {
      margin: 1rem auto;
    }

    .header-box {
      text-align: center;
      margin-bottom: 6px;
      padding: 8px 0;
    }

    .top-nav {
      margin-top: 8px;
    }

    .form-box {
      margin-top: 0.5rem;
    }

    h2.inquiry-title {
      text-align: center;
      margin: 1rem 0 0.5rem 0;
      letter-spacing: 3px;
      font-weight: 400;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 500px;
      margin: 0 auto;
    }

    input, textarea, select {
      font-family: 'Cormorant Garamond', serif;
      padding: 0.9rem;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      padding: 0.9rem 1.6rem;
      border: 1px solid #000;
      background: #fff;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 1px;
    }

    button:hover {
      background: #000;
      color: #fff;
    }
  </style>
</head>

<body>

  <main>

    <!-- HEADER -->
    <div class="header-box">

      <h2 style="margin:0;">
        <a href="index.html" style="text-decoration:none; color:inherit;">
          ANAHITA ELEONORA
        </a>
      </h2>

      <nav class="top-nav">
        <a href="index.html">HOME</a>
        <a href="gallery.html">GALLERY</a>
        <a href="om.html">ABOUT</a>
        <a href="index.html#kontakt">CONTACT</a>
      </nav>

    </div>

    <!-- TITLE -->
    <h2 class="inquiry-title">INQUIRY</h2>

    <!-- FORM -->
    <div class="form-box">

      <form action="https://formspree.io/f/xeewowor" method="POST">

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="text" name="country" placeholder="Country / Location" required>
        <input type="text" name="artwork" placeholder="Artwork / Inquiry" required>

        <select name="type" required>
          <option value="">Select inquiry type</option>
          <option value="purchase">Purchase artwork</option>
          <option value="commission">Commission work</option>
          <option value="question">General question</option>
        </select>

        <textarea name="message" placeholder="Your message..." required></textarea>

        <button type="submit">SEND INQUIRY</button>

      </form>

    </div>

  </main>

</body>
</html>
